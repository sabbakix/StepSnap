appId: com.sabbakix.stepsnap
productName: StepSnap
directories:
  output: release
  buildResources: build

files:
  - dist/**
  - electron/**

# Il modulo nativo dell'hook di input globale deve restare fuori dall'asar
asarUnpack:
  - node_modules/uiohook-napi/**

# uiohook-napi include prebuild N-API (node-gyp-build) compatibili con Electron:
# niente ricompilazione, che richiederebbe Visual Studio sulla macchina di build.
npmRebuild: false

# electron-builder converte automaticamente build/icon.png (512px)
# in .ico per Windows e .icns per macOS.
win:
  target: nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Utility
  synopsis: Documentazione processi con screenshot annotati

mac:
  target: dmg
  icon: build/icon.png
  category: public.app-category.productivity
